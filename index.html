<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smash Online: Ultimate Brawler</title>
    <style>
        * { touch-action: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { 
            margin: 0; overflow: hidden; background-color: #2c3e50; 
            font-family: 'Arial Black', sans-serif; 
            position: fixed; width: 100%; height: 100%; 
        }
        canvas { display: block; }

        #setup { 
            position: absolute; inset: 0; background: rgba(0,0,0,0.85); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; color: white; padding: 20px; text-align: center; 
        }
        .btn { 
            padding: 16px 32px; margin: 8px; font-size: 20px; cursor: pointer; 
            border-radius: 10px; border: none; font-weight: bold; transition: 0.2s;
            background: #e74c3c; color: #fff; width: 280px; text-transform: uppercase;
            box-shadow: 0 6px 0 #c0392b;
        }
        .btn:active { transform: translateY(6px); box-shadow: none; }

        #ui-layer {
            position: absolute; bottom: 30px; width: 100%; 
            display: flex; justify-content: center; gap: 40px; pointer-events: none;
            z-index: 10;
        }
        .player-status {
            background: rgba(0,0,0,0.8); color: white; padding: 10px 25px;
            border-radius: 12px; border: 4px solid #fff; text-align: center;
            min-width: 140px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .damage-text { font-size: 38px; font-weight: bold; text-shadow: 2px 2px 0 #000; }

        /* モバイル用コントローラー */
        #mobile-controls { display: none; position: absolute; inset: 0; pointer-events: none; z-index: 50; }
        .m-btn { 
            position: absolute; background: rgba(0,0,0,0.6); color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            pointer-events: auto; font-size: 24px; font-weight: bold; border: 3px solid rgba(255,255,255,0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #btn-left { bottom: 40px; left: 30px; width: 75px; height: 75px; }
        #btn-right { bottom: 40px; left: 125px; width: 75px; height: 75px; }
        
        #btn-jump { bottom: 130px; right: 40px; width: 75px; height: 75px; background: rgba(46, 204, 113, 0.8); }
        #btn-attack { bottom: 40px; right: 125px; width: 85px; height: 85px; background: rgba(231, 76, 60, 0.8); }
        #btn-special { bottom: 40px; right: 30px; width: 75px; height: 75px; background: rgba(52, 152, 219, 0.8); font-size: 20px;}

    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:#f1c40f; margin-bottom:5px; font-size: 42px; text-shadow: 3px 3px 0 #d35400;">BRAWL UNLIMITED</h1>
        <p style="margin-bottom: 30px;">吹っ飛ばし上限なし。<br>A: 近接攻撃 / B(Shift): 変化球投擲</p>
        <button id="start-game" class="btn">FIGHT!</button>
    </div>

    <div id="ui-layer"></div>

    <div id="mobile-controls">
        <div id="btn-left" class="m-btn">◀</div>
        <div id="btn-right" class="m-btn">▶</div>
        <div id="btn-attack" class="m-btn">A</div>
        <div id="btn-special" class="m-btn">B</div>
        <div id="btn-jump" class="m-btn">J</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const worldWidth = 2000, worldHeight = 1200;
        const HUB_NAME = "smash_brawler_unlimited_2026"; 

        // ステージ定義 (浮遊島構成)
        const platforms = [
            { x: worldWidth/2 - 500, y: worldHeight - 300, w: 1000, h: 40 },
            { x: worldWidth/2 - 350, y: worldHeight - 500, w: 200, h: 20 },
            { x: worldWidth/2 + 150, y: worldHeight - 500, w: 200, h: 20 },
            { x: worldWidth/2 - 100, y: worldHeight - 650, w: 200, h: 20 }
        ];

        const player = {
            id: "P-" + Math.random().toString(36).substr(2, 5),
            name: "Player",
            x: worldWidth/2, y: worldHeight/2 - 200, w: 40, h: 60,
            vx: 0, vy: 0, 
            color: `hsl(${Math.random()*360}, 80%, 50%)`,
            damage: 0, jumps: 2, facing: 1, 
            isAttacking: 0, specialCD: 0, stun: 0
        };

        const players = {};
        const projectiles = [];
        const particles = [];
        const keys = { left: false, right: false, jump: false, attack: false, special: false };
        let isMobileMode = false;
        let socket;
        
        let screenShake = 0;
        let hitStop = 0;

        // 物理演算定数
        const GRAVITY = 0.6;
        const WALK_SPEED = 7;
        const JUMP_FORCE = -15;

        document.getElementById('start-game').onclick = () => {
            player.name = prompt("名前を入力", "Fighter") || "Guest";
            document.getElementById('setup').style.display = 'none';
            if('ontouchstart' in window) { 
                isMobileMode = true; 
                document.getElementById('mobile-controls').style.display = 'block'; 
            }
            initSocket();
            requestAnimationFrame(gameLoop);
        };

        // PCキーボード
        window.onkeydown = (e) => { 
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            if((e.key === 'ArrowUp' || e.key === 'w') && !keys.jump) { keys.jump = true; doJump(); }
            if(e.key === ' ' && !keys.attack) { keys.attack = true; doAttack(); }
            if((e.key.toLowerCase() === 'b' || e.key === 'Shift') && !keys.special) { keys.special = true; doSpecial(); }
        };
        window.onkeyup = (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
            if(e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
            if(e.key === 'ArrowUp' || e.key === 'w') keys.jump = false;
            if(e.key === ' ') keys.attack = false;
            if(e.key.toLowerCase() === 'b' || e.key === 'Shift') keys.special = false;
        };

        // モバイルタッチ
        const bindBtn = (id, keyName, action) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyName] = true; if(action) action(); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyName] = false; });
        };
        bindBtn('btn-left', 'left');
        bindBtn('btn-right', 'right');
        bindBtn('btn-jump', 'jump', doJump);
        bindBtn('btn-attack', 'attack', doAttack);
        bindBtn('btn-special', 'special', doSpecial);

        function initSocket() {
            socket = new WebSocket('wss://cloud.achex.ca/');
            socket.onopen = () => {
                socket.send(JSON.stringify({auth: player.id, passwd: "pass"}));
                socket.send(JSON.stringify({joinHub: HUB_NAME}));
            };

            socket.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.auth || data.joinHub) return;

                    if (data.type === 'state' && data.id !== player.id) {
                        players[data.id] = {...data, lastUpdate: Date.now()};
                        updateUI();
                    }
                    if (data.type === 'attack' && data.id !== player.id) {
                        players[data.id] = data.pState;
                        players[data.id].isAttacking = 10; 
                        checkHit(data.pState, data.hitbox, 12, 1.0);
                    }
                    if (data.type === 'throw' && data.id !== player.id) {
                        projectiles.push(data.proj);
                    }
                    if (data.type === 'particles') {
                        createParticles(data.x, data.y, data.color);
                    }
                } catch(err) {}
            };
        }

        function doJump() {
            if (player.stun > 0) return;
            if (player.jumps > 0) {
                player.vy = JUMP_FORCE;
                player.jumps--;
            }
        }

        function doAttack() {
            if (player.stun > 0 || player.isAttacking > 0) return;
            player.isAttacking = 15; 
            
            const hitbox = {
                x: player.facing === 1 ? player.x + player.w : player.x - 70,
                y: player.y, w: 70, h: 60
            };

            if (socket && socket.readyState === 1) {
                socket.send(JSON.stringify({
                    toH: HUB_NAME, type: 'attack', id: player.id, pState: getPlayerState(), hitbox: hitbox
                }));
            }
        }

        function doSpecial() {
            if (player.stun > 0 || player.specialCD > 0) return;
            player.specialCD = 45; 
            
            // 変化球オブジェクトの生成
            const proj = {
                id: Math.random().toString(),
                x: player.x + (player.w/2),
                y: player.y + 15,
                vx: player.facing * 16, // 初速
                vy: -3,
                facing: player.facing,
                owner: player.id,
                life: 60,
                active: true
            };
            projectiles.push(proj);

            if (socket && socket.readyState === 1) {
                socket.send(JSON.stringify({ toH: HUB_NAME, type: 'throw', id: player.id, proj: proj }));
            }
        }

        function checkHit(attacker, hitbox, baseDmg, kbMult) {
            if (player.stun > 0) return; 
            
            if (player.x < hitbox.x + hitbox.w && player.x + player.w > hitbox.x &&
                player.y < hitbox.y + hitbox.h && player.y + player.h > hitbox.y) {
                
                applyHit(attacker.facing, baseDmg, kbMult);
            }
        }

        // ダメージと無制限ふっとばし処理
        function applyHit(hitFacing, baseDmg, kbMult) {
            player.damage += baseDmg + Math.floor(Math.random() * 5); 
            player.stun = 30; // 硬直
            
            // 距離制限撤廃！ダメージの2乗に比例してふっとばし力が跳ね上がる
            const kb = (8 + (player.damage * player.damage * 0.004)) * kbMult;
            
            player.vx = hitFacing * kb;
            player.vy = -kb * 0.8; 
            
            // ヒットストップと画面揺れ
            hitStop = 6;
            screenShake = Math.min(40, kb * 1.5);

            const px = player.x + player.w/2;
            const py = player.y + player.h/2;
            createParticles(px, py, "white");
            
            if (socket && socket.readyState === 1) {
                socket.send(JSON.stringify({ toH: HUB_NAME, type: 'particles', x: px, y: py, color: "white" }));
            }
            
            // 大ダメージ時にUIを揺らす
            const statusEl = document.getElementById(`status-${player.id}`);
            if(statusEl) {
                statusEl.style.transform = `scale(1.2) rotate(${(Math.random()-0.5)*10}deg)`;
                setTimeout(() => statusEl.style.transform = "none", 150);
            }
        }

        function createParticles(x, y, color) {
            for(let i=0; i<15; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                    life: 20 + Math.random()*10,
                    color: color
                });
            }
        }

        function getPlayerState() {
            return {
                x: player.x, y: player.y, damage: player.damage, 
                facing: player.facing, color: player.color, name: player.name
            };
        }

        function update() {
            if (hitStop > 0) { hitStop--; return; } // ヒットストップ処理

            if (player.stun > 0) {
                player.stun--;
                player.vx *= 0.98; // ふっとばされている最中の空気抵抗（わずか）
            } else {
                // 入力による移動
                if (keys.left) { player.vx -= 1.8; player.facing = -1; }
                if (keys.right) { player.vx += 1.8; player.facing = 1; }
                
                // 歩行速度の制限（ふっとばされていない時のみ）
                if (Math.abs(player.vx) <= WALK_SPEED + 2) {
                    if (player.vx > WALK_SPEED) player.vx = WALK_SPEED;
                    if (player.vx < -WALK_SPEED) player.vx = -WALK_SPEED;
                }
            }

            if (player.isAttacking > 0) player.isAttacking--;
            if (player.specialCD > 0) player.specialCD--;

            player.vy += GRAVITY;
            
            // 落下速度の制限（上へのふっとばし時は制限しない）
            if (player.vy > 25 && player.stun === 0) player.vy = 25;
            
            // 地上と空中の摩擦
            if (player.stun === 0) {
                if (player.jumps === 2) player.vx *= 0.85; 
                else player.vx *= 0.95;
            }

            player.x += player.vx;
            player.y += player.vy;

            // 足場判定
            for (let p of platforms) {
                if (player.vy >= 0 && 
                    player.y + player.h - player.vy <= p.y && 
                    player.y + player.h >= p.y && 
                    player.x + player.w > p.x && 
                    player.x < p.x + p.w) {
                    
                    player.y = p.y - player.h;
                    player.vy = 0;
                    player.jumps = 2; 
                }
            }

            // 変化球オブジェクトの更新
            projectiles.forEach(p => {
                if(!p.active) return;
                
                // 弾道計算: 寿命の後半で急激に重力がかかる（ドロップする軌道）
                if (p.life < 30) p.vy += 1.5; 
                else p.vy += 0.05;
                
                p.vx *= 0.98; // 空気抵抗
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                
                if (p.life <= 0) p.active = false;
                
                // 当たり判定
                if (p.owner !== player.id && p.active) {
                    if (player.x < p.x + 10 && player.x + player.w > p.x - 10 &&
                        player.y < p.y + 10 && player.y + player.h > p.y - 10) {
                        p.active = false;
                        applyHit(p.facing, 8, 0.9); // ダメージ小、ふっとばし倍率0.9
                    }
                }
                
                // 軌跡エフェクト
                particles.push({x: p.x, y: p.y, vx: 0, vy: 0, life: 10, color: "rgba(255,255,255,0.5)"});
            });

            // パーティクルの更新
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            });

            // バーストライン（即復活：リロードなしで座標とダメージをリセット）
            if (player.y > worldHeight + 300 || player.x < -800 || player.x > worldWidth + 800 || player.y < -800) {
                player.x = worldWidth / 2;
                player.y = worldHeight / 2 - 200;
                player.vx = 0;
                player.vy = 0;
                player.damage = 0; 
                player.jumps = 2;
                screenShake = 20; // 復活時エフェクト
            }

            if (socket && socket.readyState === 1 && Math.random() < 0.4) {
                socket.send(JSON.stringify({
                    toH: HUB_NAME, type: 'state', id: player.id, ...getPlayerState()
                }));
            }
            
            if(screenShake > 0) screenShake *= 0.9;
            if(screenShake < 0.5) screenShake = 0;

            updateUI();
        }

        function updateUI() {
            const ui = document.getElementById('ui-layer');
            const getDmgColor = (dmg) => dmg < 50 ? 'white' : (dmg < 100 ? '#f1c40f' : '#e74c3c');
            
            let html = `<div class="player-status" id="status-${player.id}" style="border-color:${player.color}">
                            <div style="font-size:14px; opacity:0.8;">${player.name}</div>
                            <div class="damage-text" style="color:${getDmgColor(player.damage)}">${player.damage}%</div>
                        </div>`;
            
            for (let id in players) {
                if(Date.now() - players[id].lastUpdate < 3000) {
                    html += `<div class="player-status" style="border-color:${players[id].color}">
                                <div style="font-size:14px; opacity:0.8;">${players[id].name}</div>
                                <div class="damage-text" style="color:${getDmgColor(players[id].damage)}">${players[id].damage}%</div>
                            </div>`;
                }
            }
            ui.innerHTML = html;
        }

        function draw() {
            if (hitStop >
